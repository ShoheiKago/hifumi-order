<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茫聛虏茫聛碌茫聛驴忙聴聟茅陇篓 氓聹篓氓庐陇茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fc;
    --white: #ffffff;
    --border: #e8eaf0;
    --border-light: #f0f2f8;
    --text: #2d3142;
    --text-dim: #8b90a7;
    --text-light: #b0b5ca;
    --green: #6bc8a0;
    --green-bg: #edf8f3;
    --green-border: #b8e8d4;
    --gray-bg: #f2f3f7;
    --blue: #7ba7e8;
    --blue-bg: #eef3fd;
    --peach: #f0a89a;
    --peach-bg: #fef3f1;
    --lavender: #a89ee8;
    --lavender-bg: #f3f1fd;
    --shadow-sm: 0 1px 4px rgba(45,49,66,0.06);
    --shadow: 0 2px 12px rgba(45,49,66,0.08);
    --shadow-lg: 0 8px 32px rgba(45,49,66,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  body { font-family: "Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-dot { width: 8px; height: 28px; background: linear-gradient(180deg, var(--green) 0%, var(--blue) 100%); border-radius: 4px; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; font-size: 11px; color: var(--text-dim); transition: all 0.3s; }
  .status-pill.connected { background: var(--green-bg); border-color: var(--green-border); color: #3a9e76; }
  .status-pill.error { background: var(--peach-bg); border-color: #f5c4bc; color: #c0523e; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-light); transition: background 0.3s; flex-shrink: 0; }
  .status-dot.connected { background: var(--green); }
  .status-dot.error { background: var(--peach); }
  .icon-btn { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--white); color: var(--text-dim); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
  .refresh-big-btn { height: 34px; padding: 0 16px; border: 1px solid var(--green-border); border-radius: var(--radius-sm); background: var(--green-bg); color: #3a9e76; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .refresh-big-btn:hover { background: var(--green); color: white; border-color: var(--green); }
  .refresh-big-btn.loading { opacity: 0.6; cursor: not-allowed; }
  .summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 20px 24px 0; max-width: 960px; margin: 0 auto; }
  .summary-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm); }
  .summary-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .summary-icon.occupied { background: var(--green-bg); }
  .summary-icon.vacant { background: var(--gray-bg); }
  .summary-icon.total { background: var(--lavender-bg); }
  .summary-num { font-size: 28px; font-weight: 700; line-height: 1; }
  .summary-num.occupied { color: #3a9e76; }
  .summary-num.vacant { color: var(--text-dim); }
  .summary-num.total { color: var(--lavender); }
  .summary-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .floors { padding: 20px 24px; max-width: 960px; margin: 0 auto; }
  .floor-section { margin-bottom: 20px; }
  .floor-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .floor-tag { font-size: 11px; font-weight: 700; color: var(--text-dim); background: var(--white); border: 1px solid var(--border); border-radius: 100px; padding: 3px 10px; letter-spacing: 0.05em; }
  .floor-line { flex: 1; height: 1px; background: var(--border-light); }
  .floor-count { font-size: 11px; color: var(--text-light); }
  .room-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(110px,1fr)); gap: 8px; }
  .room-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px 10px; cursor: default; transition: all 0.2s; box-shadow: var(--shadow-sm); }
  .room-card.occupied { background: var(--green-bg); border-color: var(--green-border); box-shadow: 0 2px 8px rgba(107,200,160,0.15); }
  .room-card.vacant { background: var(--white); border-color: var(--border); }
  .room-card.loading { background: var(--gray-bg); border-color: var(--border-light); opacity: 0.7; }
  .room-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .room-num { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .room-card.occupied .room-num { color: #2a7a58; }
  .room-status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; }
  .room-status.occupied { color: #3a9e76; }
  .room-status.vacant { color: var(--text-light); }
  .room-status.loading { color: var(--text-light); }
  .room-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .room-status.occupied .room-dot { background: var(--green); }
  .room-status.vacant .room-dot { background: var(--border); }
  .room-status.loading .room-dot { background: var(--border); animation: pulse 1.4s infinite; }
  .room-time { font-size: 9px; color: var(--text-light); margin-top: 4px; }
  .room-card.occupied .room-time { color: #6bb89a; }
  .room-device { font-size: 9px; color: var(--text-light); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(45,49,66,0.3); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; display: block; font-weight: 600; }
  .form-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 9px 12px; font-size: 12px; font-family: monospace; transition: border-color 0.15s; }
  .form-input:focus { outline: none; border-color: var(--blue); background: var(--white); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .btn-primary { flex: 1; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary:hover { background: #5ab88e; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--bg); border: 1.5px solid var(--border); color: var(--text-dim); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-webhook { background: var(--lavender-bg); border: 1.5px solid #ccc9f0; color: var(--lavender); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-webhook:hover { background: #ebe9fb; }
  .assign-section { margin-top: 16px; }
  .assign-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
  .assign-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .assign-room { width: 64px; font-size: 12px; color: var(--text); font-weight: 600; flex-shrink: 0; }
  .assign-select { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 11px; }
  .assign-select:focus { outline: none; border-color: var(--blue); }
  .loading-overlay { position: fixed; inset: 0; background: rgba(247,248,252,0.9); backdrop-filter: blur(4px); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 13px; color: var(--text-dim); }
  .last-update { text-align: center; font-size: 11px; color: var(--text-light); padding: 16px 24px 24px; }
  #webhookStatus { font-size: 11px; margin-top: 10px; padding: 8px 10px; border-radius: 6px; background: var(--bg); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .room-futon-btn {
    margin-top: 6px; width: 100%; padding: 4px 0;
    font-size: 10px; font-weight: 600; border-radius: 5px;
    border: 1px solid var(--border); background: var(--white);
    color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .room-futon-btn:hover { border-color: var(--blue); color: var(--blue); }
  .room-futon-done {
    margin-top: 6px; width: 100%; padding: 4px 0;
    font-size: 10px; font-weight: 600; border-radius: 5px;
    border: 1px solid var(--green-border); background: var(--green-bg);
    color: #3a9e76; text-align: center;
  }

  .room-card.futon-done {
    background: #fff8ee;
    border-color: #f0d080;
  }
  .room-card.futon-done .room-num { color: #a07820; }

  .linen-section { max-width: 960px; margin: 0 auto 20px; padding: 0 24px; }
  .linen-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .linen-tag { font-size: 11px; font-weight: 700; color: #a07820; background: #fff8ee; border: 1px solid #f0d080; border-radius: 100px; padding: 3px 10px; letter-spacing: 0.05em; }
  .linen-line { flex: 1; height: 1px; background: #f0e8d0; }
  .linen-count { font-size: 11px; color: var(--text-light); }
  .linen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .linen-card { background: #fffdf7; border: 1.5px solid #f0d080; border-radius: var(--radius-sm); padding: 12px 10px 10px; box-shadow: var(--shadow-sm); transition: all 0.2s; }
  .linen-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .linen-card.linen-complete { background: #fff8ee; border-color: #e8b840; }
  .linen-num { font-size: 16px; font-weight: 700; color: #a07820; margin-bottom: 6px; }
  .linen-guest { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .linen-btn { width: 100%; padding: 4px 0; font-size: 10px; font-weight: 600; border-radius: 5px; border: 1px solid #f0d080; background: white; color: #a07820; cursor: pointer; transition: all 0.15s; }
  .linen-btn:hover { background: #fff8ee; }
  .linen-done { width: 100%; padding: 4px 0; font-size: 10px; font-weight: 600; border-radius: 5px; border: 1px solid #e8b840; background: #fff3d0; color: #a07820; text-align: center; cursor: pointer; }
  .linen-empty { background: #f7f8fc; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 20px; text-align: center; font-size: 12px; color: var(--text-light); }
  .room-guests { font-size: 9px; color: var(--blue); margin-top: 2px; font-weight: 600; }
  @media (max-width: 480px) {
    .header { padding: 0 16px; }
    .summary { padding: 16px 16px 0; gap: 8px; }
    .floors { padding: 16px; }
    .room-grid { grid-template-columns: repeat(auto-fill,minmax(90px,1fr)); gap: 6px; }
  }
</style>
</head>
<body>

      <button class="btn-primary" id="connectBtn" onclick="connectApi()">忙聨楼莽露職茫聛聴茫聛娄氓聫聳氓戮聴</button>

<script>
const PROXY = 'https://hifumi-order.onrender.com';
const ROOMS = {
  '2F': ['201','202','203','205','206','207','208','209','210','211','212'],
  '3F': ['301','302','303','305','306','307','308','309','310','311','312','313'],
  '4F': ['401','402'],
  '氓聟卤莽聰篓': ['莽聰路氓颅聬忙碌麓氓聽麓','氓楼鲁氓颅聬忙碌麓氓聽麓'],
};
let token = localStorage.getItem('sb_token') || '6f2ca7ac784852b0dbe6dfde2cd9f419c3a78bbc68db70dfb99ebb3496d7c91a7f5f2beaa52662368de5b8167029c796';
let secret = localStorage.getItem('sb_secret') || 'bfa5c9d8bc762c12430509398c11b490';
let deviceMap = JSON.parse(localStorage.getItem('sb_device_map') || '{}');
let lastDetectedMap = JSON.parse(localStorage.getItem('sb_last_detected') || '{}');
let devices = [];
let roomStatus = {};
let futonDone = {};
let guestMap = {};
let linenDone = {};
let tomorrowGuests = [];
const OCCUPIED_MINUTES = 10;

window.addEventListener('DOMContentLoaded', async () => {
  renderFloors();
  await loadSharedData();
  if (!token || !secret) { hideLoading(); openSettings(); return; }
  await loadDevices();
});

function renderFloors() {
  const container = document.getElementById('floorsContainer');
  container.innerHTML = '';
  for (const [floor, rooms] of Object.entries(ROOMS)) {
    const section = document.createElement('div');
    section.className = 'floor-section';
    section.innerHTML = '<div class="floor-header"><div class="floor-tag">' + floor + '</div><div class="floor-line"></div><div class="floor-count">' + rooms.length + '氓庐陇</div></div><div class="room-grid" id="grid-' + floor + '"></div>';
    container.appendChild(section);
    renderRooms(floor, rooms);
  }
}

function renderRooms(floor, rooms) {
  const grid = document.getElementById('grid-' + floor);
  if (!grid) return;
  grid.innerHTML = '';
  // 忙碌麓氓聽麓莽鲁禄茫聛炉茫聝聹茫聜驴茫聝鲁茫聛陋茫聛聴
  const NO_FUTON_ROOMS = ['莽聰路氓颅聬忙碌麓氓聽麓', '氓楼鲁氓颅聬忙碌麓氓聽麓'];
  rooms.forEach(room => {
    const s = roomStatus[room] || {};
    const hasDevice = !!deviceMap[room];
    const sc = !hasDevice ? 'loading' : (s.occupied === null ? 'loading' : (s.occupied ? 'occupied' : 'vacant'));
    const st = !hasDevice ? '茫聜禄茫聝鲁茫聜碌茫聝录忙聹陋猫篓颅氓庐職' : (s.occupied === null ? '氓聫聳氓戮聴盲赂颅...' : (s.occupied ? '氓聹篓氓庐陇' : '茅聙聙氓庐陇'));
    const isFutonDone = !!futonDone[room];
    const extraClass = isFutonDone ? ' futon-done' : '';
    const showFuton = !NO_FUTON_ROOMS.includes(room);
    const futonTime = isFutonDone && futonDone[room].time ? ' ' + futonDone[room].time : '';
    const futonHtml = !showFuton ? '' : (isFutonDone
      ? '<div class="room-futon-done" onclick="toggleFuton(\'' + room + '\')" style="cursor:pointer;">芒聹聯 氓赂聝氓聸拢忙聲路茫聛聧氓庐聦盲潞聠' + futonTime + '</div>'
      : '<button class="room-futon-btn" onclick="toggleFuton(\'' + room + '\')">氓赂聝氓聸拢忙聲路茫聛聧</button>');
    const guestHtml = guestMap[room] ? '<div class="room-guests">冒聼聭楼 ' + guestMap[room] + '氓聬聧</div>' : '';
    grid.innerHTML += '<div class="room-card ' + sc + extraClass + '" id="card-' + room + '">' +
      '<div class="room-num">' + room + '</div>' +
      guestHtml +
      '<div class="room-status ' + sc + '"><div class="room-dot"></div>' + st + '</div>' +
      (s.lastTime ? '<div class="room-time">忙陇聹莽聼楼 ' + s.lastTime + '</div>' : '') +
      futonHtml +
      '</div>';
  });
}


async function loadSharedData() {
  try {
    const [resMap, resFuton, resLinen] = await Promise.all([
      fetch(PROXY + '/shared/device-map'),
      fetch(PROXY + '/shared/futon'),
      fetch(PROXY + '/shared/linen')
    ]);
    const mapData = await resMap.json();
    const futonData = await resFuton.json();
    const linenData = await resLinen.json();
    if (mapData.deviceMap && Object.keys(mapData.deviceMap).length > 0) {
      deviceMap = mapData.deviceMap;
      localStorage.setItem('sb_device_map', JSON.stringify(deviceMap));
    }
    futonDone = futonData.futon || {};
    linenDone = linenData.linen || {};
    renderFloors();
  } catch(e) { console.warn('氓聟卤忙聹聣茫聝聡茫聝录茫聜驴氓聫聳氓戮聴氓陇卤忙聲聴:', e.message); }
}

async function toggleFuton(room) {
  const isDone = !!futonDone[room];
  try {
    if (isDone) {
      await fetch(PROXY + '/shared/futon/clear', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({room})
      });
      delete futonDone[room];
    } else {
      const now = new Date();
      const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      const dateStr = now.toISOString().slice(0,10);
      await fetch(PROXY + '/shared/futon', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({room, time: timeStr, date: dateStr})
      });
      futonDone[room] = { date: dateStr, time: timeStr };
    }
    for (const [floor, rooms] of Object.entries(ROOMS)) renderRooms(floor, rooms);
  } catch(e) { alert('忙聸麓忙聳掳茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼: ' + e.message); }
}

async function loadGuestCounts() {
  try {
    const today = new Date();
    const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const [resRsv, resRooms] = await Promise.all([
      fetch(PROXY + '/staysee/reservations?search_type=stay_date&date=' + dateStr + '&children=allocate_rooms'),
      fetch(PROXY + '/staysee/rooms')
    ]);
    const dataRsv = await resRsv.json();
    const dataRooms = await resRooms.json();
    const roomNameMap = {};
    (dataRooms.rooms || []).forEach(r => { roomNameMap[r.id] = r.name; });
    guestMap = {};
    let totalGuests = 0;
    const reservations = (dataRsv.reservations || []).filter(r => r.status === 5 || r.status === 2);
    reservations.forEach(rsv => {
      const cnt = Number(rsv.number_of_guests || rsv.guests || 1);
      (rsv.allocate_rooms || rsv.room_allocations || []).forEach(alloc => {
        const rname = roomNameMap[alloc.room_id] || String(alloc.room_id);
        guestMap[rname] = (guestMap[rname] || 0) + cnt;
        totalGuests += cnt;
      });
    });
    document.getElementById('guestTotalCount').textContent = totalGuests;
    for (const [floor, rooms] of Object.entries(ROOMS)) renderRooms(floor, rooms);
  } catch(e) { console.warn('茫聝聛茫聜搂茫聝聝茫聜炉茫聜陇茫聝鲁盲潞潞忙聲掳氓聫聳氓戮聴氓陇卤忙聲聴:', e.message); }
}


async function loadTomorrowGuests() {
  try {
    const today = new Date();
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

    // 盲禄聤忙聴楼茫聝禄忙聵聨忙聴楼茫聛庐盲赂隆忙聳鹿茫聜聮氓聫聳氓戮聴茂录聢茫聝陋茫聝聧茫聝鲁盲陆聹忙楼颅茫聛炉氓聣聧忙聴楼茫聙聹氓陆聯忙聴楼茫聛戮茫聛搂猫隆篓莽陇潞茂录聣
    const [resRsvToday, resRsvTomorrow, resRooms] = await Promise.all([
      fetch(PROXY + '/staysee/reservations?search_type=stay_date&date=' + fmt(today) + '&children=allocate_rooms'),
      fetch(PROXY + '/staysee/reservations?search_type=stay_date&date=' + fmt(tomorrow) + '&children=allocate_rooms'),
      fetch(PROXY + '/staysee/rooms')
    ]);
    const dataRsvToday = await resRsvToday.json();
    const dataRsvTomorrow = await resRsvTomorrow.json();
    const dataRooms = await resRooms.json();

    const roomNameMap = {};
    (dataRooms.rooms || []).forEach(r => { roomNameMap[r.id] = r.name; });

    // 莽驴聦忙聴楼茫聝聛茫聜搂茫聝聝茫聜炉茫聜陇茫聝鲁盲潞聢氓庐職茂录聢status=2茂录聣茫聛庐茫聛驴氓炉戮猫卤隆
    const seenRooms = new Set();
    tomorrowGuests = [];

    const addGuests = (reservations) => {
      reservations.filter(r => r.status === 2).forEach(rsv => {
        const guestName = rsv.name_kanji || rsv.name_kana || rsv.name || '';
        (rsv.allocate_rooms || rsv.room_allocations || []).forEach(alloc => {
          const rname = roomNameMap[alloc.room_id] || String(alloc.room_id);
          if (!seenRooms.has(rname)) {
            seenRooms.add(rname);
            tomorrowGuests.push({ room: rname, name: guestName });
          }
        });
      });
    };

    addGuests(dataRsvToday.reservations || []);
    addGuests(dataRsvTomorrow.reservations || []);

    tomorrowGuests.sort((a, b) => (parseInt(a.room) || 9999) - (parseInt(b.room) || 9999));
    renderLinenSection();
  } catch(e) { console.warn('莽驴聦忙聴楼盲潞聢莽麓聞氓聫聳氓戮聴氓陇卤忙聲聴:', e.message); }
}

function renderLinenSection() {
  const section = document.getElementById('linenSection');
  const grid = document.getElementById('linenGrid');
  const countEl = document.getElementById('linenCount');
  if (tomorrowGuests.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  countEl.textContent = '莽驴聦忙聴楼茫聝聛茫聜搂茫聝聝茫聜炉茫聜陇茫聝鲁 ' + tomorrowGuests.length + '氓庐陇';
  grid.innerHTML = tomorrowGuests.map(g => {
    const isDone = !!linenDone[g.room];
    const timeStr = isDone && linenDone[g.room].time ? ' ' + linenDone[g.room].time : '';
    return '<div class="linen-card' + (isDone ? ' linen-complete' : '') + '">' +
      '<div class="linen-num">' + g.room + '</div>' +
      (g.name ? '<div class="linen-guest">' + g.name + ' 忙搂聵</div>' : '') +
      (isDone
        ? '<div class="linen-done" onclick="toggleLinen(\'' + g.room + '\')">芒聹聯 茫聝陋茫聝聧茫聝鲁氓庐聦盲潞聠' + timeStr + '</div>'
        : '<button class="linen-btn" onclick="toggleLinen(\'' + g.room + '\')">茫聝陋茫聝聧茫聝鲁猫拢聟莽聺聙</button>'
      ) + '</div>';
  }).join('');
}

async function toggleLinen(room) {
  const isDone = !!linenDone[room];
  try {
    if (isDone) {
      await fetch(PROXY + '/shared/linen/clear', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({room})
      });
      delete linenDone[room];
    } else {
      const now = new Date();
      const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      const dateStr = now.toISOString().slice(0,10);
      await fetch(PROXY + '/shared/linen', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({room, time: timeStr, date: dateStr})
      });
      linenDone[room] = { date: dateStr, time: timeStr };
    }
    renderLinenSection();
  } catch(e) { alert('忙聸麓忙聳掳茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼: ' + e.message); }
}

async function loadDevices() {
  showLoading('茫聝聡茫聝聬茫聜陇茫聜鹿盲赂聙猫娄搂茫聜聮氓聫聳氓戮聴盲赂颅...');
  try {
    const res = await fetch(PROXY + '/switchbot/devices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, secret }) });
    const data = await res.json();
    if (data.statusCode === 100) {
      devices = data.body.deviceList || [];
      setStatus('connected', devices.length + '氓聫掳茫聛庐茫聝聡茫聝聬茫聜陇茫聜鹿茫聜聮忙陇聹氓聡潞');
      const sensors = devices.filter(d => d.deviceType?.toLowerCase().includes('motion') || d.deviceType?.toLowerCase().includes('presence'));
      if (sensors.length > 0) { await refreshAll(); } else { hideLoading(); openSettings(); }
      await loadGuestCounts();
      await loadTomorrowGuests();
    } else { setStatus('error', 'API猫陋聧猫篓录茫聜篓茫聝漏茫聝录'); hideLoading(); openSettings(); }
  } catch (e) { setStatus('error', '忙聨楼莽露職氓陇卤忙聲聴'); hideLoading(); openSettings(); }
}

async function refreshAll() {
  const btn = document.querySelector('.refresh-big-btn');
  if (btn) { btn.classList.add('loading'); btn.textContent = '芒聠禄 忙聸麓忙聳掳盲赂颅...'; btn.disabled = true; }
  setStatus('connected', '忙聸麓忙聳掳盲赂颅...');
  try {
    const res = await fetch(PROXY + '/switchbot/webhook/status');
    if (res.ok) {
      const data = await res.json();
      if (data && data.detections) {
        for (const room of Object.keys(deviceMap)) {
          const deviceId = deviceMap[room];
          if (data.detections[deviceId]) {
            const serverTs = data.detections[deviceId];
            if (!lastDetectedMap[room] || serverTs > lastDetectedMap[room]) lastDetectedMap[room] = serverTs;
          }
        }
        localStorage.setItem('sb_last_detected', JSON.stringify(lastDetectedMap));
      }
    }
  } catch(e) { console.warn('Webhook status氓聫聳氓戮聴氓陇卤忙聲聴:', e.message); }
  const allRooms = Object.values(ROOMS).flat();
  const now = new Date();
  let occupied = 0, vacant = 0;
  for (const room of allRooms) {
    const deviceId = deviceMap[room];
    if (!deviceId) continue;
    const lastDetectedAt = lastDetectedMap[room] || null;
    const isOccupied = lastDetectedAt !== null && (now.getTime() - lastDetectedAt) < OCCUPIED_MINUTES * 60 * 1000;
    const lastTime = lastDetectedAt ? (() => { const d = new Date(lastDetectedAt); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); })() : null;
    const deviceName = devices.find(d => d.deviceId === deviceId)?.deviceName || deviceId;
    roomStatus[room] = { occupied: isOccupied, lastTime, lastDetectedAt, deviceName };
    if (isOccupied) occupied++; else vacant++;
  }
  for (const [floor, rooms] of Object.entries(ROOMS)) renderRooms(floor, rooms);
  document.getElementById('occupiedCount').textContent = occupied;
  document.getElementById('vacantCount').textContent = vacant;
  document.getElementById('totalCount').textContent = allRooms.length;
  const now2 = new Date();
  document.getElementById('lastUpdate').textContent = '忙聹聙莽碌聜忙聸麓忙聳掳: ' + now2.getFullYear() + '/' + (now2.getMonth()+1) + '/' + now2.getDate() + ' ' + String(now2.getHours()).padStart(2,'0') + ':' + String(now2.getMinutes()).padStart(2,'0');
  hideLoading();
  const btn2 = document.querySelector('.refresh-big-btn');
  if (btn2) { btn2.classList.remove('loading'); btn2.textContent = '芒聠禄 忙聸麓忙聳掳'; btn2.disabled = false; }
  setStatus('connected', devices.length + '氓聫掳茫聛庐茫聝聡茫聝聬茫聜陇茫聜鹿茫聜聮忙陇聹氓聡潞');
}

function openSettings() {
  document.getElementById('inputToken').value = token;
  document.getElementById('inputSecret').value = secret;
  if (devices.length > 0) renderAssignSection();
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

async function setupWebhook() {
  const webhookUrl = 'https://hifumi-order.onrender.com/switchbot/webhook/receive';
  const statusEl = document.getElementById('webhookStatus');
  statusEl.style.display = 'block';
  statusEl.style.color = 'var(--text-dim)';
  statusEl.textContent = 'Webhook猫篓颅氓庐職盲赂颅...';
  try {
    const res = await fetch(PROXY + '/switchbot/webhook/setup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, secret, url: webhookUrl }) });
    const data = await res.json();
    if (data.statusCode === 100 || data.statusCode === 151) { statusEl.style.color = '#3a9e76'; statusEl.textContent = '芒聹聯 Webhook猫篓颅氓庐職氓庐聦盲潞聠'; }
    else { statusEl.style.color = '#c0523e'; statusEl.textContent = '茫聜篓茫聝漏茫聝录: ' + JSON.stringify(data); }
  } catch(e) { statusEl.style.color = '#c0523e'; statusEl.textContent = '忙聨楼莽露職氓陇卤忙聲聴: ' + e.message; }
}

function renderAssignSection() {
  const section = document.getElementById('assignSection');
  const rows = document.getElementById('assignRows');
  section.style.display = 'block';
  const sensors = devices.filter(d => d.deviceType?.toLowerCase().includes('motion') || d.deviceType?.toLowerCase().includes('presence'));
  if (sensors.length === 0) { section.style.display = 'none'; return; }
  const allRooms = Object.values(ROOMS).flat();
  rows.innerHTML = allRooms.map(room => '<div class="assign-row"><div class="assign-room">' + room + '</div><select class="assign-select" id="assign-' + room + '"><option value="">忙聹陋猫篓颅氓庐職</option>' + sensors.map(s => '<option value="' + s.deviceId + '"' + (deviceMap[room] === s.deviceId ? ' selected' : '') + '>' + s.deviceName + '</option>').join('') + '</select></div>').join('');
}

async function connectApi() {
  const t = document.getElementById('inputToken').value.trim();
  const s = document.getElementById('inputSecret').value.trim();
  if (!t || !s) { alert('茫聝聢茫聝录茫聜炉茫聝鲁茫聛篓茫聜路茫聝录茫聜炉茫聝卢茫聝聝茫聝聢茫聜聮氓聟楼氓聤聸茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞'); return; }
  token = t; secret = s;
  localStorage.setItem('sb_token', token); localStorage.setItem('sb_secret', secret);
  document.getElementById('connectBtn').textContent = '忙聨楼莽露職盲赂颅...';
  document.getElementById('connectBtn').disabled = true;
  try {
    const res = await fetch(PROXY + '/switchbot/devices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, secret }) });
    const data = await res.json();
    if (data.statusCode === 100) {
      devices = data.body.deviceList || [];
      setStatus('connected', devices.length + '氓聫掳茫聛庐茫聝聡茫聝聬茫聜陇茫聜鹿茫聜聮忙陇聹氓聡潞');
      renderAssignSection();
      document.getElementById('connectBtn').textContent = '氓聣虏茫聜聤氓陆聯茫聛娄茫聜聮盲驴聺氓颅聵';
      document.getElementById('connectBtn').onclick = saveAssignment;
    } else { alert('API猫陋聧猫篓录茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼茫聙聜'); }
  } catch (e) { alert('忙聨楼莽露職茫聛芦氓陇卤忙聲聴茫聛聴茫聛戮茫聛聴茫聛聼: ' + e.message); }
  document.getElementById('connectBtn').disabled = false;
}

function saveAssignment() {
  const allRooms = Object.values(ROOMS).flat();
  allRooms.forEach(room => {
    const sel = document.getElementById('assign-' + room);
    if (sel) { if (sel.value) deviceMap[room] = sel.value; else delete deviceMap[room]; }
  });
  localStorage.setItem('sb_device_map', JSON.stringify(deviceMap));
  fetch(PROXY + '/shared/device-map', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({deviceMap})
  }).catch(e => console.warn('氓聟卤忙聹聣盲驴聺氓颅聵氓陇卤忙聲聴:', e));
  closeSettings(); refreshAll();
}

function showLoading(text) { document.getElementById('loadingText').textContent = text || '猫陋颅茫聛驴猫戮录茫聛驴盲赂颅...'; document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
function setStatus(type, text) {
  document.getElementById('statusDot').className = 'status-dot ' + type;
  document.getElementById('statusPill').className = 'status-pill ' + type;
  document.getElementById('statusText').textContent = text;
}
setInterval(() => { if (token && secret && Object.keys(deviceMap).length > 0) refreshAll(); }, 300000);
</script>
