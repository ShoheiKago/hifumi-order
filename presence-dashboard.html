<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひふみ旅館 在室ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #232118;
    --border: #2e2b24;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --green: #4a8c5c;
    --green-bright: #5db371;
    --red: #8c3a3a;
    --ash: #6b6760;
    --text: #e8e4dc;
    --text-dim: #9a9590;
  }

  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 6px; height: 28px;
    background: var(--gold);
    border-radius: 3px;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; }
  .header-sub { font-size: 10px; color: var(--gold); letter-spacing: 0.2em; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
    background: var(--surface2);
    padding: 5px 10px; border-radius: 100px;
    border: 1px solid var(--border);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ash);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green-bright); box-shadow: 0 0 6px var(--green-bright); }
  .status-dot.error { background: #e05c5c; }
  .refresh-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 12px;
    border-radius: 6px; font-size: 11px; cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* サマリーバー */
  .summary-bar {
    display: flex; gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    flex: 1; background: var(--surface);
    padding: 12px 16px; text-align: center;
  }
  .summary-num { font-size: 24px; font-weight: 700; line-height: 1; }
  .summary-num.occupied { color: var(--green-bright); }
  .summary-num.vacant { color: var(--text-dim); }
  .summary-num.total { color: var(--gold); }
  .summary-label { font-size: 10px; color: var(--ash); margin-top: 3px; letter-spacing: 0.1em; }

  /* フロアセクション */
  .floors { padding: 16px; max-width: 900px; margin: 0 auto; }
  .floor-section { margin-bottom: 20px; }
  .floor-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .floor-label {
    font-size: 11px; font-weight: 700;
    color: var(--gold); letter-spacing: 0.2em;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--gold-dim);
    padding: 2px 10px; border-radius: 100px;
  }
  .floor-count { font-size: 11px; color: var(--ash); }

  /* 部屋グリッド */
  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }

  /* 部屋カード */
  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .room-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--border);
    transition: background 0.3s;
  }
  .room-card.occupied { border-color: rgba(93,179,113,0.3); }
  .room-card.occupied::before { background: var(--green-bright); }
  .room-card.vacant { border-color: var(--border); }
  .room-card.loading { opacity: 0.5; }
  .room-card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }

  .room-num {
    font-size: 18px; font-weight: 700;
    color: var(--text); letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .room-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
  }
  .room-status.occupied { color: var(--green-bright); }
  .room-status.vacant { color: var(--ash); }
  .room-status.loading { color: var(--ash); }
  .room-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }
  .room-status.occupied .room-status-dot { background: var(--green-bright); box-shadow: 0 0 5px var(--green-bright); }
  .room-status.vacant .room-status-dot { background: var(--ash); }
  .room-status.loading .room-status-dot { background: var(--border); animation: pulse 1.2s infinite; }

  .room-time {
    font-size: 9px; color: var(--ash);
    margin-top: 5px;
  }
  .room-device {
    font-size: 9px; color: var(--gold-dim);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* 設定モーダル */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%; max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 16px; font-weight: 700;
    color: var(--gold); margin-bottom: 4px;
  }
  .modal-sub { font-size: 12px; color: var(--ash); margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 10px 12px; font-size: 12px;
    font-family: monospace;
  }
  .form-input:focus { outline: none; border-color: var(--gold-dim); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-primary {
    flex: 1; background: var(--green); color: white;
    border: none; border-radius: 6px; padding: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--green-bright); }
  .btn-secondary {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px; padding: 10px 16px;
    font-size: 13px; cursor: pointer;
  }

  /* デバイス割り当てセクション */
  .assign-section { margin-top: 16px; }
  .assign-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
  .assign-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .assign-room {
    width: 60px; font-size: 12px; color: var(--gold);
    font-weight: 600; flex-shrink: 0;
  }
  .assign-select {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 6px 8px; font-size: 11px;
  }

  /* ローディング */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(15,14,12,0.9);
    z-index: 300;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: var(--ash); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* 最終更新 */
  .last-update {
    text-align: center; font-size: 10px; color: var(--ash);
    padding: 12px; border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  /* 設定ボタン */
  .settings-btn {
    background: none; border: 1px solid var(--border);
    color: var(--ash); width: 30px; height: 30px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .settings-btn:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">SwitchBot APIに接続中...</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <div class="header-logo"></div>
    <div>
      <div class="header-title">ひふみ旅館</div>
      <div class="header-sub">在室ダッシュボード</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">接続中...</span>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">↻ 更新</button>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- サマリーバー -->
<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-num occupied" id="occupiedCount">-</div>
    <div class="summary-label">在室</div>
  </div>
  <div class="summary-item">
    <div class="summary-num vacant" id="vacantCount">-</div>
    <div class="summary-label">退室</div>
  </div>
  <div class="summary-item">
    <div class="summary-num total" id="totalCount">-</div>
    <div class="summary-label">総部屋数</div>
  </div>
</div>

<!-- フロア -->
<div class="floors" id="floorsContainer"></div>

<div class="last-update" id="lastUpdate"></div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settingsModal" style="display:none">
  <div class="modal">
    <div class="modal-title">⚙ 設定</div>
    <div class="modal-sub">SwitchBot APIトークンとセンサーの割り当てを設定します</div>

    <div class="form-group">
      <label class="form-label">APIトークン</label>
      <input class="form-input" id="inputToken" placeholder="トークンを入力..." type="password">
    </div>
    <div class="form-group">
      <label class="form-label">クライアントシークレット</label>
      <input class="form-input" id="inputSecret" placeholder="シークレットを入力..." type="password">
    </div>

    <div class="assign-section" id="assignSection" style="display:none">
      <div class="assign-title">センサーを部屋に割り当て</div>
      <div id="assignRows"></div>
    </div>

    <div id="webhookStatus" style="margin-top:12px;font-size:11px;color:var(--ash);display:none;"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">キャンセル</button>
      <button class="btn-secondary" onclick="setupWebhook()" style="color:var(--gold);border-color:var(--gold-dim);">Webhook設定</button>
      <button class="btn-primary" id="connectBtn" onclick="connectApi()">接続して取得</button>
    </div>
  </div>
</div>

<script>
// ===== 定数 =====
const PROXY = 'https://hifumi-order.onrender.com';

// 部屋マスタ
const ROOMS = {
  '2F': ['201','202','203','205','206','207','208','209','210','211','212'],
  '3F': ['301','302','303','305','306','307','308','309','310','311','312','313'],
  '4F': ['401','402'],
  '共用': ['男子浴場','女子浴場'],
};

// ===== 状態 =====
let token = localStorage.getItem('sb_token') || '';
let secret = localStorage.getItem('sb_secret') || '';
let deviceMap = JSON.parse(localStorage.getItem('sb_device_map') || '{}'); // roomNum -> deviceId
let lastDetectedMap = JSON.parse(localStorage.getItem('sb_last_detected') || '{}'); // roomNum -> timestamp
let devices = []; // SwitchBotのデバイス一覧
let roomStatus = {}; // roomNum -> { occupied, lastTime, lastDetectedAt, deviceName }
const OCCUPIED_MINUTES = 10; // 最終検知からX分以内は在室とみなす

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', async () => {
  renderFloors();
  if (!token || !secret) {
    hideLoading();
    openSettings();
    return;
  }
  await loadDevices();
});

// ===== フロア描画 =====
function renderFloors() {
  const container = document.getElementById('floorsContainer');
  container.innerHTML = '';
  for (const [floor, rooms] of Object.entries(ROOMS)) {
    const section = document.createElement('div');
    section.className = 'floor-section';
    section.innerHTML = `
      <div class="floor-header">
        <div class="floor-label">${floor}</div>
        <div class="floor-count" id="floor-count-${floor}">${rooms.length}部屋</div>
      </div>
      <div class="room-grid" id="grid-${floor}"></div>
    `;
    container.appendChild(section);
    renderRooms(floor, rooms);
  }
}

function renderRooms(floor, rooms) {
  const grid = document.getElementById(`grid-${floor}`);
  grid.innerHTML = '';
  rooms.forEach(room => {
    const status = roomStatus[room] || { occupied: null, lastTime: null, deviceName: null };
    const isOccupied = status.occupied;
    const statusClass = status.occupied === null ? 'loading' : (isOccupied ? 'occupied' : 'vacant');
    const statusText = status.occupied === null ? '取得中...' : (isOccupied ? '在室' : '退室');
    const hasDevice = !!deviceMap[room];

    grid.innerHTML += `
      <div class="room-card ${hasDevice ? statusClass : 'loading'}" id="card-${room}">
        <div class="room-num">${room}</div>
        <div class="room-status ${hasDevice ? statusClass : 'loading'}">
          <div class="room-status-dot"></div>
          ${hasDevice ? statusText : 'センサー未設定'}
        </div>
        ${status.lastTime ? `<div class="room-time">最終検知 ${status.lastTime}</div>` : ''}
        ${status.deviceName ? `<div class="room-device">${status.deviceName}</div>` : ''}
      </div>
    `;
  });
}

// ===== API接続 =====
async function loadDevices() {
  showLoading('デバイス一覧を取得中...');
  try {
    const res = await fetch(`${PROXY}/switchbot/devices`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, secret })
    });
    const data = await res.json();

    if (data.statusCode === 100) {
      devices = data.body.deviceList || [];
      setStatus('connected', `${devices.length}台のデバイスを検出`);

      // センサー系デバイスを抽出
      const sensors = devices.filter(d =>
        d.deviceType?.toLowerCase().includes('motion') ||
        d.deviceType?.toLowerCase().includes('presence')
      );

      if (sensors.length > 0) {
        await refreshAll();
      } else {
        hideLoading();
        openSettings();
      }
    } else {
      setStatus('error', 'API認証エラー');
      hideLoading();
      openSettings();
    }
  } catch (e) {
    setStatus('error', '接続失敗');
    hideLoading();
    openSettings();
  }
}

async function refreshAll() {
  // Webhookサーバーから最新の検知時刻を取得
  try {
    const res = await fetch(`${PROXY}/switchbot/webhook/status`);
    if (res.ok) {
      const data = await res.json();
      if (data && data.detections) {
        for (const room of Object.keys(deviceMap)) {
          const deviceId = deviceMap[room];
          if (data.detections[deviceId]) {
            const serverTs = data.detections[deviceId];
            if (!lastDetectedMap[room] || serverTs > lastDetectedMap[room]) {
              lastDetectedMap[room] = serverTs;
            }
          }
        }
        localStorage.setItem('sb_last_detected', JSON.stringify(lastDetectedMap));
      }
    }
  } catch(e) {
    console.warn('Webhook status取得失敗:', e.message);
  }

  // 表示を更新
  const allRooms = Object.values(ROOMS).flat();
  const now = new Date();
  let occupied = 0, vacant = 0;

  for (const room of allRooms) {
    const deviceId = deviceMap[room];
    if (!deviceId) continue;
    const lastDetectedAt = lastDetectedMap[room] || null;
    const isOccupied = lastDetectedAt !== null &&
      (now.getTime() - lastDetectedAt) < OCCUPIED_MINUTES * 60 * 1000;
    const lastTime = lastDetectedAt
      ? (() => { const d = new Date(lastDetectedAt); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; })()
      : null;
    const deviceName = devices.find(d => d.deviceId === deviceId)?.deviceName || deviceId;
    roomStatus[room] = { occupied: isOccupied, lastTime, lastDetectedAt, deviceName };
    if (isOccupied) occupied++; else vacant++;
  }

  for (const [floor, rooms] of Object.entries(ROOMS)) renderRooms(floor, rooms);
  document.getElementById('occupiedCount').textContent = occupied;
  document.getElementById('vacantCount').textContent = vacant;
  document.getElementById('totalCount').textContent = allRooms.length;
  const now2 = new Date();
  document.getElementById('lastUpdate').textContent =
    `最終更新: ${now2.getFullYear()}/${now2.getMonth()+1}/${now2.getDate()} ${String(now2.getHours()).padStart(2,'0')}:${String(now2.getMinutes()).padStart(2,'0')}`;
  hideLoading();
}


// ===== 設定モーダル =====
function openSettings() {
  document.getElementById('inputToken').value = token;
  document.getElementById('inputSecret').value = secret;

  // 既存のデバイスがあれば割り当てセクション表示
  if (devices.length > 0) renderAssignSection();

  document.getElementById('settingsModal').style.display = 'flex';
}


async function setupWebhook() {
  const webhookUrl = 'https://hifumi-order.onrender.com/switchbot/webhook/receive';
  const statusEl = document.getElementById('webhookStatus');
  statusEl.style.display = 'block';
  statusEl.textContent = 'Webhook設定中...';
  try {
    const res = await fetch(`${PROXY}/switchbot/webhook/setup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, secret, url: webhookUrl })
    });
    const data = await res.json();
    if (data.statusCode === 100 || data.statusCode === 151) {
      statusEl.style.color = 'var(--green-bright)';
      statusEl.textContent = '✓ Webhook設定完了: ' + webhookUrl;
    } else {
      statusEl.style.color = '#e05c5c';
      statusEl.textContent = 'エラー: ' + JSON.stringify(data);
    }
  } catch(e) {
    statusEl.style.color = '#e05c5c';
    statusEl.textContent = '接続失敗: ' + e.message;
  }
}

function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}

function renderAssignSection() {
  const section = document.getElementById('assignSection');
  const rows = document.getElementById('assignRows');
  section.style.display = 'block';

  const sensors = devices.filter(d =>
    d.deviceType?.toLowerCase().includes('motion') ||
    d.deviceType?.toLowerCase().includes('presence')
  );

  if (sensors.length === 0) { section.style.display = 'none'; return; }

  const allRooms = Object.values(ROOMS).flat();
  rows.innerHTML = allRooms.map(room => `
    <div class="assign-row">
      <div class="assign-room">${room}号室</div>
      <select class="assign-select" id="assign-${room}">
        <option value="">-- 未設定 --</option>
        ${sensors.map(s => `
          <option value="${s.deviceId}" ${deviceMap[room] === s.deviceId ? 'selected' : ''}>
            ${s.deviceName}
          </option>
        `).join('')}
      </select>
    </div>
  `).join('');
}

async function connectApi() {
  const t = document.getElementById('inputToken').value.trim();
  const s = document.getElementById('inputSecret').value.trim();
  if (!t || !s) { alert('トークンとシークレットを入力してください'); return; }

  token = t; secret = s;
  localStorage.setItem('sb_token', token);
  localStorage.setItem('sb_secret', secret);

  document.getElementById('connectBtn').textContent = '接続中...';
  document.getElementById('connectBtn').disabled = true;

  try {
    const res = await fetch(`${PROXY}/switchbot/devices`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, secret })
    });
    const data = await res.json();

    if (data.statusCode === 100) {
      devices = data.body.deviceList || [];
      setStatus('connected', `${devices.length}台のデバイスを検出`);
      renderAssignSection();
      document.getElementById('connectBtn').textContent = '割り当てを保存';
      document.getElementById('connectBtn').onclick = saveAssignment;
    } else {
      alert('API認証に失敗しました。トークンを確認してください。');
    }
  } catch (e) {
    alert('接続に失敗しました: ' + e.message);
  }

  document.getElementById('connectBtn').disabled = false;
}

function saveAssignment() {
  const allRooms = Object.values(ROOMS).flat();
  allRooms.forEach(room => {
    const sel = document.getElementById(`assign-${room}`);
    if (sel) {
      if (sel.value) deviceMap[room] = sel.value;
      else delete deviceMap[room];
    }
  });
  localStorage.setItem('sb_device_map', JSON.stringify(deviceMap));
  closeSettings();
  refreshAll();
}

// ===== UI ヘルパー =====
function showLoading(text = '読み込み中...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}
function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  label.textContent = text;
}

// 30秒ごとに自動更新
setInterval(() => {
  if (token && secret && Object.keys(deviceMap).length > 0) refreshAll();
}, 10000);
</script>
</body>
</html>
